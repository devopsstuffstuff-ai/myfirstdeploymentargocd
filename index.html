<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Sonam Wanchuk</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #09111f 0%, #132a4f 50%, #1f5f8b 100%);
        color: #f8fbff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 760px);
        padding: 2.2rem;
        border-radius: 24px;
        background: rgba(9, 17, 31, 0.82);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
      }
      .pill {
        display: inline-block;
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        background: rgba(111, 255, 206, 0.16);
        color: #7df8c5;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2rem, 4vw, 3rem);
      }
      p {
        line-height: 1.7;
        font-size: 1rem;
        color: #dbe8f8;
      }
      .actions {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        flex-wrap: wrap;
      }
      a {
        text-decoration: none;
        color: #07101d;
        background: linear-gradient(135deg, #7df8c5, #4dc1ff);
        padding: 0.8rem 1.2rem;
        border-radius: 999px;
        font-weight: 700;
      }
      a.secondary {
        color: #f8fbff;
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="pill">Hope • Awareness • Action</div>
      <h1>Save Sonam Wanchuk</h1>
      <p>
        This page is a calm, modern tribute created to raise awareness and support the cause for Sonam Wanchuk.
        Every small action can make a meaningful difference.
      </p>
      <div class="actions">
        <a href="https://github.com/devopsstuffstuff-ai/myfirstdeploymentargocd" target="_blank" rel="noreferrer">View Project</a>
        <a class="secondary" href="mailto:hello@example.com">Contact Support</a>
      </div>
    </main>
  </body>
</html>
